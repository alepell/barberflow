services:
  postgres:
    image: postgres:16-alpine
    container_name: barberbook-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: barberbook
      POSTGRES_PASSWORD: barberbook123
      POSTGRES_DB: barberbook
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
